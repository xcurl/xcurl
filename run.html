<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Runner</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f1117;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            background: #161b22;
            border-bottom: 1px solid #262c36;
        }

        .topbar h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .topbar-actions {
            display: flex;
            gap: 10px;
        }

        /* Layout */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0px;
            padding: 5px;
            overflow: hidden;
        }

        /* Panels */
        .panel {
            display: flex;
            flex-direction: column;
            background: #161b22;
            border: 1px solid #262c36;
            border-radius: 0px;
            overflow: hidden;
            min-height: 0;
            gap: 10px;
        }

        .panel-header {
            height: 52px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #262c36;
            background: #1c2128;
            padding: 0 18px;
        }

        .panel-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #c9d1d9;
        }

        /* Editor */
        textarea {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            outline: none;
            padding: 0%;
            background: #0d1117;
            color: #e6edf3;
            font-size: 13px;
            line-height: 1.6;
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
        }

        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 20px;
        }

        /* Preview */
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff;
        }

        /* Buttons */
        button {
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        #runButton {
            background: #238636;
            color: white;
        }

        #runButton:hover {
            background: #2ea043;
        }

        #resetButton {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        #resetButton:hover {
            background: #30363d;
        }

        /* Footer Note */
        .note {
            height: 42px;
            flex-shrink: 0;
            display: flex;
            align-items: center;

            background: #161b22;
            border-top: 1px solid #262c36;
            font-size: 12px;
            color: #8b949e;
        }

        /* 13-inch MacBook optimization */
        @media (max-width: 1440px) {
            textarea {
                font-size: 12.5px;
            }

            .panel-header {
                height: 48px;
            }

            .topbar {
                height: 58px;
            }
        }

        /* Tablet */
        @media (max-width: 980px) {
            main {
                grid-template-columns: 1fr;
            }

            body {
                overflow: auto;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <h1>HTML Runner</h1>

        <div class="topbar-actions">
            <button id="resetButton" type="button">Reset</button>
            <button id="runButton" type="button">Run HTML</button>
        </div>
    </div>

    <main>

        <section class="panel">
            <div class="panel-header">
                <h2>HTML Source</h2>
            </div>

            <textarea id="source">
<!DOCTYPE html>
<html>
<head>
    <title>Preview</title>
</head>
<body>
    <h1>Hello from the runner!</h1>
    <p>This HTML is executed inside the preview frame.</p>
    <button onclick="alert('This works!')">Click me</button>
</body>
</html>
            </textarea>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>Preview</h2>
            </div>

            <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
        </section>

    </main>


    <script>
        const source = document.getElementById('source');
        const preview = document.getElementById('preview');
        const runButton = document.getElementById('runButton');
        const resetButton = document.getElementById('resetButton');

        const initialContent = source.value.trim();

        function renderPreview() {
            const html = source.value;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            preview.src = url;
            preview.onload = () => URL.revokeObjectURL(url);
        }

        runButton.addEventListener('click', renderPreview);

        resetButton.addEventListener('click', () => {
            source.value = initialContent;
            renderPreview();
        });

        document.addEventListener('DOMContentLoaded', renderPreview);
    </script>

</body>
</html>
